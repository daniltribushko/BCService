version: '3.9'

services:
  redis:
    image: redis:latest
    container_name: bc_redis_db
    ports:
      - '6379:6379'
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.4
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - '22181:2181'
  kafka:
    image: confluentinc/cp-kafka:7.4.4
    depends_on:
      - zookeeper
    ports:
      - '29092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
  gateway:
    container_name: bc_gateway
    image: daniltribushko26/bc_gateway
    ports:
      - '8000:8000'
    environment:
      - SERVER_URL=bc-gateway
      - USER_TARGET_PORT=8001
      - USER_TARGET_HOST=bc-user-service
      - GEO_TARGET_PORT=8002
      - GEO_TARGET_HOST=bc-geo-service
      - AUTHOR_TARGET_PORT=8003
      - AUTHOR_TARGET_HOST=bc-author-service
  bc_user_service_db:
    container_name: bc_user_service_db
    image: postgres:17
    environment:
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=123
      - POSTGRES_DB=bc_user_db
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U root -d bc_user_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
  bc-user-service:
    container_name: bc-user-service
    image: daniltribushko26/bc_user_service:0.0.1
    depends_on:
      bc_user_service_db:
        condition: service_healthy
    ports:
      - '8001:8001'
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://bc_user_service_db:5432/bc_user_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=123
  bc_geo_service_db:
    container_name: bc_geo_service_db
    image: postgres:17
    environment:
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=123
      - POSTGRES_DB=bc_geo_db
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U root -d bc_geo_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
  bc-geo-service:
    container_name: bc-geo-service
    image: daniltribushko26/bc_geo_service:0.0.1
    depends_on:
      bc_geo_service_db:
        condition: service_healthy
    ports:
      - "8002:8002"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://bc_geo_service_db:5432/bc_geo_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=123
  bc_author_service_db:
    container_name: bc_author_service_db
    image: postgres17
    environment:
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=123
      - POSTGRES_DB=bc_author_db
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d bc_author_db"]
      interval: 5s
      timeout: 5s
      retries: 5
  bc-author-service:
    container_name: bc-author-service
    image: daniltribushko26/bc_author_service:0.0.1
    depends_on:
      bc_author_service_db:
        condition: service_healthy
    ports:
      - "8003:8003"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://bc_author_service_db:5432/bc_author_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=123